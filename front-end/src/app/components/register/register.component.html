<div class="login-page">
  <div class="login-card">
    <h1 class="brand">ZenFlow</h1>
    <p class="tagline">Create your account</p>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="e.g. asel_k" class="input" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="e.g. asel@mail.com" class="input" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" class="input" />
    </div>

    @if (errorMessage) {
      <div class="error-msg">{{ errorMessage }}</div>
    }

    <button class="btn-primary" (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Register' }}
    </button>

    <p class="register-link">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
