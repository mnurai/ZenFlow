<div class="login-page">
  <div class="login-card">
    <h1 class="brand">ZenFlow</h1>
    <p class="tagline">Your day, shaped around how you feel</p>

    <div class="form-group">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        [(ngModel)]="username"
        placeholder="e.g. asel_k"
        class="input"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        class="input"
      />
    </div>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <button class="btn-primary" (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Log in' }}
    </button>

    <p class="register-link">
      No account? <a routerLink="/register">Register here</a>
    </p>

    <div class="info-box">
      JWT interceptor attaches <code>Authorization: Bearer &lt;token&gt;</code> to every subsequent request automatically.
    </div>
  </div>
</div>
